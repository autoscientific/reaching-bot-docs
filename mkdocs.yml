site_name: ReachingBot Documentation
site_description: User documentation for ReachingBot and ReachingBot Device Manager
site_url: https://autoscientific.github.io/reaching-bot-docs/
repo_url: https://github.com/autoscientific/reaching-bot-docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Downloads: downloads.md
  - Pellet Detection: pellet-detection.md
  - Outcome Classification: outcome-classification.md
  - Video Recording Modes: video-recording-modes.md
  - ReachingBot API: api.md
  - Troubleshooting: troubleshooting.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
